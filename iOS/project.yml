name: ResinLog
options:
  bundleIdPrefix: com.shimondeitel.curetracker
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  ResinLog:
    type: application
    platform: iOS
    sources:
      - path: ResinLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.curetracker
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: ResinLog/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  ResinLogTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: ResinLogTests
      - path: ResinLog.storekit
    dependencies:
      - target: ResinLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.curetracker.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  ResinLogUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: ResinLogUITests
    dependencies:
      - target: ResinLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.curetracker.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  ResinLog:
    build:
      targets:
        ResinLog: all
        ResinLogTests: [test]
        ResinLogUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: ResinLog.storekit
    test:
      config: Debug
      storeKitConfiguration: ResinLog.storekit
      targets:
        - ResinLogTests
        - ResinLogUITests
    archive:
      config: Release
